<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IC-KS CRM Login</title>

  <style>
    :root {
      --bg-1: #f8fbff;
      --bg-2: #eef5ff;
      --bg-3: #f9fcff;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: rgba(255, 255, 255, 0.92);
      --text: #24324a;
      --text-soft: #60708d;
      --line: rgba(186, 205, 232, 0.45);
      --primary: #5b8def;
      --primary-2: #7fb3ff;
      --teal: #57c6c2;
      --mint: #7ed7c1;
      --rose: #f6b7c8;
      --shadow-lg: 0 24px 60px rgba(115, 149, 199, 0.18);
      --shadow-md: 0 14px 34px rgba(122, 152, 199, 0.14);
      --shadow-sm: 0 8px 20px rgba(122, 152, 199, 0.1);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(168, 202, 255, 0.26), transparent 28%),
        radial-gradient(circle at 100% 10%, rgba(126, 215, 193, 0.22), transparent 24%),
        radial-gradient(circle at 70% 100%, rgba(246, 183, 200, 0.18), transparent 24%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.6;
    }

    body::before {
      top: -80px;
      left: -90px;
      background: rgba(127, 179, 255, 0.24);
    }

    body::after {
      right: -100px;
      bottom: -100px;
      background: rgba(126, 215, 193, 0.22);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 26px;
      background: rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(201, 216, 238, 0.45);
      box-shadow: 0 8px 24px rgba(141, 169, 207, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.65)),
        linear-gradient(135deg, var(--primary), var(--teal));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: "IC";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #3b67b7;
      font-size: 15px;
      letter-spacing: 0.4px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo {
      font-size: 26px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #4d7fe5, #61b7d5, #4d7fe5);
      background-size: 200% auto;
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
      animation: shimmer 5s linear infinite;
    }

    .logo-sub {
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .nav-right {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(197, 214, 238, 0.5);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 520px;
      position: relative;
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 30px;
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, rgba(91,141,239,0.85), rgba(87,198,194,0.75), rgba(246,183,200,0.7));
    }

    .login-card::after {
      content: "";
      position: absolute;
      right: -50px;
      top: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,202,255,0.38), transparent 70%);
      pointer-events: none;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 14px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .subtitle {
      margin: 0;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,255,255,0.88), rgba(246,250,255,0.75));
      border: 1px solid rgba(197, 214, 238, 0.55);
      color: #5f7396;
      font-size: 12px;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }

    .field {
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      height: 50px;
      border: 1px solid rgba(190, 208, 233, 0.62);
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(248,251,255,0.92));
      border-radius: var(--radius-md);
      padding: 0 15px;
      color: var(--text);
      outline: none;
      transition: 0.22s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78);
      font: inherit;
    }

    input::placeholder {
      color: #92a2bc;
    }

    input:focus {
      border-color: rgba(91,141,239,0.78);
      box-shadow:
        0 0 0 4px rgba(126, 177, 255, 0.14),
        0 10px 24px rgba(141, 175, 224, 0.12);
      transform: translateY(-1px);
    }

    button {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.1px;
      transition: 0.22s ease;
      color: #fff;
      background: linear-gradient(135deg, #5b8def, #78adff);
      box-shadow: var(--shadow-sm);
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
    }

    .status.error {
      color: #c85b72;
    }

    .status.success {
      color: #2f8d6a;
    }

    @media (max-width: 640px) {
      .navbar {
        padding: 14px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
      }

      .logo {
        font-size: 22px;
      }

      .nav-right {
        display: none;
      }

      .main {
        padding: 16px;
      }

      .login-card {
        padding: 22px;
      }

      .section-head {
        flex-direction: column;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="navbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-text">
          <span class="logo">IC-KS</span>
          <span class="logo-sub">CRM System</span>
        </div>
      </div>
      <div class="nav-right">Role Based Access</div>
    </div>

    <div class="main">
      <div class="login-card">
        <div class="section-head">
          <div>
            <h1>Welcome Back</h1>
            <p class="subtitle">
              Sign in once and the system will automatically identify whether you are an admin or user and redirect you to the correct dashboard.
            </p>
          </div>
          <div class="chip">Secure Login</div>
        </div>

        <div class="field">
          <input id="loginEmail" type="email" placeholder="Email" />
        </div>

        <div class="field">
          <input id="loginPass" type="password" placeholder="Password" />
        </div>

        <button id="loginBtn" onclick="login()">Login</button>
        <div id="statusMsg" class="status"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyCsxAw40sFLw00PtEas3cvzRMEjkDZ9NJE",
      authDomain: "client-tracker-tool-5bdf6.firebaseapp.com",
      projectId: "client-tracker-tool-5bdf6"
    });

    const auth = getAuth(app);
    const db = getFirestore(app);

    const emailInput = document.getElementById("loginEmail");
    const passInput = document.getElementById("loginPass");
    const loginBtn = document.getElementById("loginBtn");
    const statusMsg = document.getElementById("statusMsg");

    function setStatus(message = "", type = "") {
      statusMsg.textContent = message;
      statusMsg.className = "status" + (type ? ` ${type}` : "");
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? "Signing In..." : "Login";
    }

    async function redirectByRole(user) {
      if (!user?.email) {
        setStatus("Unable to identify this account.", "error");
        await signOut(auth);
        return;
      }

      const userEmail = user.email.trim().toLowerCase();
      const roleRef = doc(db, "roles", userEmail);
      const roleSnap = await getDoc(roleRef);

      if (!roleSnap.exists()) {
        setStatus("No role assigned for this account. Please contact admin.", "error");
        await signOut(auth);
        return;
      }

      const roleData = roleSnap.data();
      const role = String(roleData.role || "").toLowerCase();
      const active = roleData.active !== false;

      if (!active) {
        setStatus("This account is inactive. Please contact admin.", "error");
        await signOut(auth);
        return;
      }

      if (role === "admin") {
        window.location.href = "admin.html";
        return;
      }

      if (role === "user") {
        window.location.href = "user.html";
        return;
      }

      setStatus("Invalid role configured for this account.", "error");
      await signOut(auth);
    }

    window.login = async () => {
      const email = emailInput.value.trim().toLowerCase();
      const password = passInput.value;

      if (!email || !password) {
        setStatus("Please enter both email and password.", "error");
        return;
      }

      try {
        setLoading(true);
        setStatus("Checking your access...", "success");
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        setStatus(error.message || "Login failed.", "error");
        setLoading(false);
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        setLoading(false);
        return;
      }

      try {
        setStatus("Login successful. Redirecting...", "success");
        await redirectByRole(user);
      } catch (error) {
        setStatus(error.message || "Unable to verify role.", "error");
        setLoading(false);
        await signOut(auth);
      }
    });

    [emailInput, passInput].forEach((el) => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
    });
  </script>
</body>
</html>

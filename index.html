<!DOCTYPE html>
<html>
<head>
  <title>Client Workflow Tracker</title>
  <style>
    body { font-family: Arial; margin: 20px; background:#f5f7fa; }
    input, select, button { margin:5px; padding:8px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
    .progress { height:20px; background:#ddd; border-radius:10px; overflow:hidden; }
    .bar { height:100%; transition:0.3s; }
    .login { max-width:300px; margin:auto; }
  </style>
</head>
<body>

<div id="loginDiv" class="login">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="appDiv" style="display:none;">
<h2>Client Entry</h2>

<input id="name" placeholder="Name">
<input id="pb" placeholder="PB No">
<input id="pan" placeholder="PAN">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">

<select id="itr" onchange="setFee()">
  <option value="">Select ITR</option>
  <option value="ITR1">ITR-1</option>
  <option value="ITR2">ITR-2/3/4</option>
</select>

<input id="fee" placeholder="Fee" readonly>

<select id="payment">
  <option value="">Select Payment</option>
  <option>Cash</option>
  <option>UPI</option>
  <option>Bank Transfer</option>
</select>

<select id="stage">
  <option>Client registration at office</option>
  <option>Partial submission by client</option>
  <option>Full submission by client</option>
  <option>Work initiated at office</option>
  <option>In progress</option>
  <option>For client approval</option>
  <option>Completed</option>
</select>

<button onclick="addClient()">Add Client</button>

<h2>Clients</h2>
<div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsxAw40sFLw00PtEas3cvzRMEjkDZ9NJE",
  authDomain: "client-tracker-tool-5bdf6.firebaseapp.com",
  projectId: "client-tracker-tool-5bdf6",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let stages = [
"Client registration at office",
"Partial submission by client",
"Full submission by client",
"Work initiated at office",
"In progress",
"For client approval",
"Completed"
];

// LOGIN
window.login = function () {
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPass").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      document.getElementById("loginDiv").style.display = "none";
      document.getElementById("appDiv").style.display = "block";
      loadClients();
    })
    .catch(err => alert(err.message));
};

// AUTO FEE
window.setFee = function(){
  let itr = document.getElementById("itr").value;
  document.getElementById("fee").value = itr === "ITR1" ? 849 : itr === "ITR2" ? 1349 : "";
};

// ADD CLIENT (FINAL FIXED)
window.addClient = async function(){

  const name = document.getElementById("name").value;
  const pb = document.getElementById("pb").value;
  const pan = document.getElementById("pan").value;
  const mobile = document.getElementById("mobile").value;
  const email = document.getElementById("email").value;
  const itr = document.getElementById("itr").value;
  const fee = document.getElementById("fee").value;
  const payment = document.getElementById("payment").value;
  const stage = document.getElementById("stage").value;

  // VALIDATION (prevents undefined)
  if(!name || !pan || !itr || !fee || !payment){
    alert("Please fill all required fields properly");
    return;
  }

  try {
    await addDoc(collection(db, "clients"), {
      name,
      pb,
      pan,
      mobile,
      email,
      itr,
      fee: Number(fee),
      payment,
      stage,
      created: new Date()
    });

    alert("Client Added Successfully");

  } catch (err) {
    alert("Error: " + err.message);
    console.error(err);
  }
};

// LOAD CLIENTS
function loadClients(){
  onSnapshot(collection(db, "clients"), (snapshot)=>{
    document.getElementById("list").innerHTML = "";

    snapshot.forEach(doc=>{
      let c = doc.data();
      let percent = ((stages.indexOf(c.stage)+1)/stages.length)*100;
      let color = percent<40?"red":percent<80?"orange":"green";

      document.getElementById("list").innerHTML += `
      <div class="card">
        <b>${c.name}</b> (${c.pan})<br>
        Fee: ₹${c.fee}<br>
        Stage: ${c.stage}
        <div class="progress">
          <div class="bar" style="width:${percent}%; background:${color}"></div>
        </div>
      </div>`;
    });
  });
}
</script>

</body>
</html>

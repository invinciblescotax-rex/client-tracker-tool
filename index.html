<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICKS - CRM System</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("oCSNm-4jMM9RJpB35");
</script>

<!-- Export libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{
font-family:Tahoma;
background:#f5f7fb;
margin:0;
padding:20px;
}

h2{
border-left:5px solid #3b82f6;
padding-left:10px;
}

input,select{
padding:8px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-danger{background:#ef4444;color:white;}
.btn-success{background:#22c55e;color:white;}

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.deleted{
opacity:0.5;
}
</style>
</head>

<body>

<h1>ICKS - CRM System</h1>

<div id="loginDiv">
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="appDiv" style="display:none;">

<h2>Search</h2>
<input id="search" placeholder="Search..." onkeyup="filterClients()">

<h2>Client Entry</h2>

<input id="name" placeholder="Name">
<input id="pb" placeholder="PB No">
<input id="pan" placeholder="PAN">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">

<select id="itr" onchange="setFee()">
<option value="">Select ITR</option>
<option value="ITR1">ITR1</option>
<option value="ITR2">ITR2</option>
<option value="CONSULT">Consultation</option>
</select>

<input id="fee" placeholder="Fee">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<select id="stage">
<option>Client registration at office</option>
<option>In Progress</option>
<option>Filed</option>
<option>Completed</option>
</select>

<br>
<button onclick="saveClient()">Save</button>
<button onclick="logout()">Logout</button>

<h2>Clients</h2>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportPDF()">Export PDF</button>

<div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCsxAw40sFLw00PtEas3cvzRMEjkDZ9NJE",
authDomain:"client-tracker-tool-5bdf6.firebaseapp.com",
projectId:"client-tracker-tool-5bdf6"
});

const auth=getAuth(app);
const db=getFirestore(app);

let currentUserEmail="";
let currentUserRole="user";
let allClients=[];
let filteredClients=[];

// ROLE FIX (SAFE)
async function getUserRole(email){
const clean=email.toLowerCase().trim();
const snap=await getDoc(doc(db,"roles",clean));
currentUserRole=snap.exists()?snap.data().role.toLowerCase().trim():"user";
console.log("ROLE:",currentUserRole);
}

// TIME
function getISTTime(){
return new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
}

// AUTH
onAuthStateChanged(auth, async(user)=>{
if(user){
currentUserEmail=user.email.toLowerCase().trim();
await getUserRole(currentUserEmail);

loginDiv.style.display="none";
appDiv.style.display="block";
loadClients();
}else{
loginDiv.style.display="block";
appDiv.style.display="none";
}
});

window.login=()=>signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value);
window.logout=()=>signOut(auth);

// FEE
window.setFee=()=>{
let v=itr.value;
fee.value=v==="ITR1"?849:v==="ITR2"?1349:v==="CONSULT"?199:"";
};

// SAVE CLIENT
window.saveClient=async()=>{
let name=nameInput("name");
let pb=nameInput("pb");
let pan=nameInput("pan");
let mobile=nameInput("mobile");
let email=nameInput("email");
let stage=document.getElementById("stage").value;
let itr=document.getElementById("itr").value;
let feeVal=document.getElementById("fee").value;

if(!pan){alert("PAN required");return;}

let ref=doc(db,"clients",pan);
let snap=await getDoc(ref);
let isNew=!snap.exists();

// COMPLETION CONTROL
if(stage==="Completed" && currentUserRole!=="admin"){
await setDoc(doc(db,"requests",pan+"_completion"),{
pan,requestedBy:currentUserEmail,type:"completion",status:"pending",createdAt:getISTTime()
});
alert("Request sent for admin approval");
return;
}

let data={
name,pb,pan,mobile,email,itr,
fee:Number(feeVal),
stage,
isDeleted:false,
deleteRequested:false,
requestedBy:"",
createdBy:currentUserEmail
};

if(isNew)data.createdAt=getISTTime();
if(stage==="Completed"&&!snap.data()?.completedAt)data.completedAt=getISTTime();

await setDoc(ref,data,{merge:true});

// EMAIL CREATION
if(isNew&&stage==="Client registration at office"){
emailjs.send("service_ns9w7qv","template_87k6k2w",{name,pan,mobile,itr,fee:feeVal});
}

alert("Saved");
};

function nameInput(id){return document.getElementById(id).value.trim();}

// DELETE
window.requestDelete=async(pan)=>{
await setDoc(doc(db,"clients",pan),{deleteRequested:true,requestedBy:currentUserEmail},{merge:true});
emailjs.send("service_ns9w7qv","template_rigq89q",{pan,requestedBy:currentUserEmail});
};

window.approveDelete=async(pan,requestedBy)=>{
if(currentUserRole!=="admin"){alert("Only admin can approve deletion");return;}
if(requestedBy===currentUserEmail){alert("Cannot approve own");return;}
await setDoc(doc(db,"clients",pan),{isDeleted:true},{merge:true});
alert("Deleted");
};

// LOAD
function loadClients(){
onSnapshot(collection(db,"clients"),snap=>{
allClients=[];
snap.forEach(d=>allClients.push(d.data()));
filteredClients=[...allClients];
renderClients(filteredClients);
});
}

// SEARCH
window.filterClients=()=>{
let q=search.value.toLowerCase();
renderClients(allClients.filter(c=>c.name?.toLowerCase().includes(q)||c.pan?.toLowerCase().includes(q)));
};

// RENDER
function renderClients(data){
list.innerHTML="";
data.forEach(c=>{
list.innerHTML+=`
<div class="card ${c.isDeleted?'deleted':''}">
<b>${c.name}</b> (${c.pan})<br>
Mobile: ${c.mobile}<br>
Email: ${c.email}<br>
ITR: ${c.itr}<br>
Fee: ₹${c.fee}<br>
Stage: ${c.stage}<br>
Created: ${c.createdAt||'-'}<br>
Completed: ${c.completedAt||'-'}<br>

${!c.isDeleted&&!c.deleteRequested?`<button class="btn-danger" onclick="requestDelete('${c.pan}')">Delete</button>`:''}

${c.deleteRequested&&!c.isDeleted?`Pending (${c.requestedBy})
<button class="btn-success" onclick="approveDelete('${c.pan}','${c.requestedBy}')">Approve</button>`:''}
</div>`;
});
}

// EXPORT
window.exportExcel=()=>{
let ws=XLSX.utils.json_to_sheet(allClients);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Clients");
XLSX.writeFile(wb,"report.xlsx");
};

window.exportPDF=()=>{
const { jsPDF }=window.jspdf;
let doc=new jsPDF();
doc.text(JSON.stringify(allClients,null,2),10,10);
doc.save("report.pdf");
};

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Client Workflow Tracker</title>
  <style>
    body { font-family: Arial; margin: 20px; background:#f5f7fa; }
    input, select, button { margin:5px; padding:8px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
    .danger { background:red; color:white; }
    .approve { background:green; color:white; }
    .pending { color:orange; font-weight:bold; }
    .deleted { background:#eee; opacity:0.6; }
  </style>
</head>
<body>

<div id="loginDiv">
  <h2>Login</h2>
  <input id="loginEmail"><br>
  <input id="loginPass" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="appDiv" style="display:none;">

<h2>Search</h2>
<input id="search" placeholder="Search by Name / PAN / Mobile / Email / PB" onkeyup="filterClients()">

<h2>Client Entry</h2>
<input id="name" placeholder="Name">
<input id="pb" placeholder="PB No">
<input id="pan" placeholder="PAN">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">

<select id="itr" onchange="setFee()">
<option value="">Select ITR</option>
<option value="ITR1">ITR-1</option>
<option value="ITR2">ITR-2/3/4</option>
</select>

<input id="fee" readonly>

<select id="payment">
<option>Cash</option>
<option>UPI</option>
<option>Bank</option>
</select>

<select id="stage">
<option>Client registration at office</option>
<option>Partial submission by client</option>
<option>Full submission by client</option>
<option>Work initiated at office</option>
<option>In progress</option>
<option>For client approval</option>
<option>Completed</option>
</select>

<button onclick="saveClient()">Save</button>
<button onclick="logout()">Logout</button>

<h2>Clients</h2>
<div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("oCSNm-4jMM9RJpB35");
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCsxAw40sFLw00PtEas3cvzRMEjkDZ9NJE",
  authDomain:"client-tracker-tool-5bdf6.firebaseapp.com",
  projectId:"client-tracker-tool-5bdf6"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUserEmail="";
let allClients=[];

// AUTH
onAuthStateChanged(auth,(user)=>{
if(user){
currentUserEmail=user.email;
loginDiv.style.display="none";
appDiv.style.display="block";
loadClients();
}else{
loginDiv.style.display="block";
appDiv.style.display="none";
}
});

// LOGIN
window.login=()=>signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value);

// LOGOUT
window.logout=()=>signOut(auth);

// FEE
window.setFee=()=>{
fee.value= itr.value==="ITR1"?849: itr.value==="ITR2"?1349:"";
};

// SAVE
window.saveClient=async()=>{
let ref=doc(db,"clients",pan.value);
let snap=await getDoc(ref);
let isNew=!snap.exists();

await setDoc(ref,{
name:name.value,
pb:pb.value,
pan:pan.value,
mobile:mobile.value,
email:email.value,
itr:itr.value,
fee:Number(fee.value),
stage:stage.value,
isDeleted:false,
deleteRequested:false,
requestedBy:"",
updated:new Date()
},{merge:true});

if(isNew && stage.value==="Client registration at office"){
emailjs.send("service_ns9w7qv","template_87k6k2w",{
name:name.value,pan:pan.value,mobile:mobile.value,itr:itr.value,fee:fee.value
});
}

alert("Saved");
};

// DELETE REQUEST
window.requestDelete=async(pan)=>{
await setDoc(doc(db,"clients",pan),{
deleteRequested:true,
requestedBy:currentUserEmail
},{merge:true});

emailjs.send("service_ns9w7qv","template_rigq89q",{
pan:pan,
requestedBy:currentUserEmail
});

alert("Delete request sent");
};

// APPROVE DELETE (SOFT DELETE)
window.approveDelete=async(pan,requestedBy)=>{
if(requestedBy===currentUserEmail){
alert("Cannot approve your own request");
return;
}

await setDoc(doc(db,"clients",pan),{
isDeleted:true,
deletedBy:currentUserEmail,
deletedAt:new Date()
},{merge:true});

alert("Marked as deleted");
};

// LOAD
function loadClients(){
onSnapshot(collection(db,"clients"),(snapshot)=>{
allClients=[];
snapshot.forEach(d=>allClients.push(d.data()));
renderClients(allClients);
});
}

// SEARCH FILTER
window.filterClients=()=>{
let q=search.value.toLowerCase();
let filtered=allClients.filter(c=>
(c.name||"").toLowerCase().includes(q) ||
(c.pan||"").toLowerCase().includes(q) ||
(c.mobile||"").toLowerCase().includes(q) ||
(c.email||"").toLowerCase().includes(q) ||
(c.pb||"").toLowerCase().includes(q)
);
renderClients(filtered);
};

// RENDER
function renderClients(data){
list.innerHTML="";

data.forEach(c=>{
list.innerHTML+=`
<div class="card ${c.isDeleted?'deleted':''}">
<b>${c.name}</b> (${c.pan})<br>

${c.isDeleted ? "<b>Deleted</b><br>" : ""}

${
!c.deleteRequested && !c.isDeleted
? `<button class="danger" onclick="requestDelete('${c.pan}')">Delete</button>`
: c.deleteRequested && !c.isDeleted
? `<div class="pending">Pending (${c.requestedBy})</div>
<button class="approve" onclick="approveDelete('${c.pan}','${c.requestedBy}')">Approve</button>`
: ""
}
</div>`;
});
}
</script>

</body>
</html>

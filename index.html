<!DOCTYPE html>
<html>
<head>
  <title>Client Workflow Tracker</title>

  <style>
  body {
    margin:0;
    font-family: Tahoma, Arial, sans-serif;
    background:#f7f9fc;
    color:#2d2d2d;
    line-height:1.5;
  }

  /* NAVBAR */
  .navbar {
    background:#ffffff;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 1px 6px rgba(0,0,0,0.06);
    font-size:18px;
    font-weight:600;
  }

  /* 🔥 ANIMATED ICKS LOGO */
  .logo {
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;
    background: linear-gradient(90deg, #007bff, #6f42c1, #00c6ff);
    background-size: 200% auto;
    color: transparent;
    background-clip: text;
    -webkit-background-clip: text;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  /* SUBTEXT */
  .logo-sub {
    font-size:13px;
    color:#666;
    margin-left:8px;
    font-weight:500;
  }

  /* CONTAINER */
  .container {
    max-width:1100px;
    margin:auto;
    padding:30px 20px 40px;
  }

  h2 {
    margin-top:40px;
    margin-bottom:10px;
    font-size:20px;
    font-weight:600;
    color:#1f1f1f;
  }

  .form-grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:14px;
    margin-top:10px;
  }

  input, select {
    padding:12px;
    border-radius:8px;
    border:1px solid #e0e0e0;
    width:100%;
    background:white;
    font-size:14px;
    transition:all 0.2s ease;
  }

  input:focus, select:focus {
    outline:none;
    border-color:#007bff;
    box-shadow:0 0 0 2px rgba(0,123,255,0.1);
  }

  button {
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:6px 4px 0 0;
    font-size:14px;
    font-weight:500;
    transition:all 0.2s ease;
  }

  .btn-primary { background:#007bff; color:white; }
  .btn-primary:hover {
    background:#0062cc;
    transform:translateY(-1px);
    box-shadow:0 4px 12px rgba(0,123,255,0.25);
  }

  .btn-danger { background:#e74c3c; color:white; }
  .btn-danger:hover { background:#c0392b; transform:translateY(-1px); }

  .btn-success { background:#2ecc71; color:white; }
  .btn-success:hover { background:#27ae60; transform:translateY(-1px); }

  .btn-export { background:#6f42c1; color:white; }
  .btn-export:hover { background:#59359c; transform:translateY(-1px); }

  #search {
    padding:12px;
    width:320px;
    border-radius:8px;
    border:1px solid #e0e0e0;
  }

  #search:focus {
    outline:none;
    border-color:#007bff;
    box-shadow:0 0 0 2px rgba(0,123,255,0.1);
  }

  .card {
    background:white;
    padding:18px 20px;
    margin:14px 0;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    transition:all 0.25s ease;
    border:1px solid #f0f0f0;
  }

  .card:hover {
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
  }

  .deleted {
    background:#fafafa;
    opacity:0.65;
  }

  .pending {
    color:#ff8c00;
    font-weight:600;
    margin:6px 0;
  }

</style>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<div class="navbar">
  <div>
    <span class="logo">ICKS</span>
    <span class="logo-sub">CRM System</span>
  </div>
  <div>Client Tracker</div>
</div>

<div class="container">

<div id="loginDiv">
  <h2>Login</h2>
  <input id="loginEmail"><br><br>
  <input id="loginPass" type="password"><br><br>
  <button class="btn-primary" onclick="login()">Login</button>
</div>

<div id="appDiv" style="display:none;">

<h2>Search</h2>
<input id="search" placeholder="Search..." onkeyup="filterClients()">

<h2>Export</h2>
<button class="btn-export" onclick="exportExcel()">Excel</button>
<button class="btn-export" onclick="exportPDF()">PDF</button>

<h2>Client Entry</h2>

<div class="form-grid">
  <input id="name" placeholder="Name">
  <input id="pb" placeholder="PB No">
  <input id="pan" placeholder="PAN">
  <input id="mobile" placeholder="Mobile">
  <input id="email" placeholder="Email">

  <select id="itr" onchange="setFee()">
    <option value="">Select ITR</option>
    <option value="ITR1">ITR-1</option>
    <option value="ITR2">ITR-2/3/4</option>
    <option value="CONSULT">Consultation</option>
  </select>

  <input id="fee" readonly placeholder="Fee">

  <select id="payment">
    <option>Cash</option>
    <option>UPI</option>
    <option>Bank</option>
  </select>

  <select id="stage">
    <option>Client registration at office</option>
    <option>Partial submission by client</option>
    <option>Full submission by client</option>
    <option>Work initiated at office</option>
    <option>In progress</option>
    <option>For client approval</option>
    <option>Completed</option>
  </select>
</div>

<button class="btn-primary" onclick="saveClient()">Save</button>
<button onclick="logout()">Logout</button>

<h2>Clients</h2>
<div id="list"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("oCSNm-4jMM9RJpB35");
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCsxAw40sFLw00PtEas3cvzRMEjkDZ9NJE",
  authDomain:"client-tracker-tool-5bdf6.firebaseapp.com",
  projectId:"client-tracker-tool-5bdf6"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUserEmail="";
let allClients=[];
let filteredClients=[];

function getISTTime(){
  return new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" });
}

onAuthStateChanged(auth,(user)=>{
if(user){
currentUserEmail=user.email;
loginDiv.style.display="none";
appDiv.style.display="block";
loadClients();
}else{
loginDiv.style.display="block";
appDiv.style.display="none";
}
});

window.login=()=>signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value);
window.logout=()=>signOut(auth);

window.setFee=()=>{
const itr=document.getElementById("itr").value;
if(itr==="ITR1") fee.value=849;
else if(itr==="ITR2") fee.value=1349;
else if(itr==="CONSULT") fee.value=199;
else fee.value="";
};

window.saveClient=async()=>{
const name=nameInput("name");
const pb=nameInput("pb");
const pan=nameInput("pan");
const mobile=nameInput("mobile");
const email=nameInput("email");
const itr=document.getElementById("itr").value;
const fee=document.getElementById("fee").value;
const payment=document.getElementById("payment").value;
const stage=document.getElementById("stage").value;

if(!pan){ alert("PAN required"); return; }

let ref=doc(db,"clients",pan);
let snap=await getDoc(ref);
let isNew=!snap.exists();

let data={
name,pb,pan,mobile,email,itr,
fee:Number(fee),payment,stage,
isDeleted:false,deleteRequested:false,requestedBy:"",
createdBy: currentUserEmail
};

if(isNew){ data.createdAt = getISTTime(); }
if(stage==="Completed" && !snap.data()?.completedAt){
data.completedAt = getISTTime();
}

await setDoc(ref,data,{merge:true});

if(isNew && stage==="Client registration at office"){
emailjs.send("service_ns9w7qv","template_87k6k2w",{name,pan,mobile,itr,fee});
}

alert("Saved");
};

function nameInput(id){
return document.getElementById(id).value.trim();
}

// 🔥 FIXED DELETE WITH EMAIL
window.requestDelete=async(pan)=>{
await setDoc(doc(db,"clients",pan),{
deleteRequested:true,
requestedBy:currentUserEmail
},{merge:true});

// EMAIL TRIGGER ADDED
emailjs.send("service_ns9w7qv","template_rigq89q",{
pan: pan,
requestedBy: currentUserEmail
});
};

window.approveDelete=async(pan,requestedBy)=>{
if(requestedBy===currentUserEmail){
alert("Cannot approve your own request");
return;
}
await setDoc(doc(db,"clients",pan),{
isDeleted:true,
deletedBy:currentUserEmail
},{merge:true});
};

function loadClients(){
onSnapshot(collection(db,"clients"),(snapshot)=>{
allClients=[];
snapshot.forEach(d=>allClients.push(d.data()));
filteredClients=[...allClients];
renderClients(filteredClients);
});
}

window.filterClients=()=>{
let q=search.value.toLowerCase();
filteredClients=allClients.filter(c=>
(c.name||"").toLowerCase().includes(q) ||
(c.pan||"").toLowerCase().includes(q)
);
renderClients(filteredClients);
};

function renderClients(data){
list.innerHTML="";
data.forEach(c=>{
list.innerHTML+=`
<div class="card ${c.isDeleted?'deleted':''}">
<b>${c.name}</b> (${c.pan})<br>
Mobile: ${c.mobile}<br>
Email: ${c.email}<br>
ITR: ${c.itr}<br>
Fee: ₹${c.fee}<br>
Stage: ${c.stage}<br>

<b>Created:</b> ${c.createdAt || '-'}<br>
<b>Completed:</b> ${c.completedAt || '-'}<br>

${c.isDeleted ? "<b style='color:red;'>Deleted</b><br>" : ""}

${
!c.deleteRequested && !c.isDeleted
? `<button class="btn-danger" onclick="requestDelete('${c.pan}')">Delete</button>`
: c.deleteRequested && !c.isDeleted
? `<div class="pending">Pending (${c.requestedBy})</div>
<button class="btn-success" onclick="approveDelete('${c.pan}','${c.requestedBy}')">Approve</button>`
: ""
}
</div>`;
});
}

window.exportExcel=()=>{
let formatted=(filteredClients.length?filteredClients:allClients).map((c,i)=>({
"Sl. No.":i+1,"Name":c.name,"PB No.":c.pb,"PAN":c.pan,
"Mobile Number":c.mobile,"Mail Address":c.email,
"Type of ITR":c.itr,"Fees":c.fee,"Status":c.stage,
"Created By":c.createdBy,"Created At":c.createdAt,"Completed At":c.completedAt
}));
let ws=XLSX.utils.json_to_sheet(formatted);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Client Report");
XLSX.writeFile(wb,"Client_Report.xlsx");
};

window.exportPDF=()=>{
const { jsPDF }=window.jspdf;
let doc=new jsPDF('landscape');

let headers=[["Sl.No","Name","PB","PAN","Mobile","Email","ITR","Fees","Status","Created By","Created","Completed"]];
let rows=(filteredClients.length?filteredClients:allClients).map((c,i)=>[
i+1,c.name,c.pb,c.pan,c.mobile,c.email,c.itr,c.fee,c.stage,c.createdBy,c.createdAt,c.completedAt
]);

doc.autoTable({head:headers,body:rows});
doc.save("Client_Report.pdf");
};
</script>

</body>
</html>

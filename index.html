                                          <!DOCTYPE html>
<html>
<head>
  <title>Client Workflow Tracker</title>

<style>
  body {
    margin:0;
    font-family: Tahoma, Arial, sans-serif;
    background:#f7f9fc;
    color:#2d2d2d;
    line-height:1.5;
  }

  /* NAVBAR */
  .navbar {
    background:#ffffff;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 1px 6px rgba(0,0,0,0.06);
    font-size:18px;
    font-weight:600;
  }

  /* 🔥 ANIMATED ICKS LOGO */
  .logo {
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
    background: linear-gradient(90deg, #007bff, #6f42c1, #00c6ff);
    background-size: 200% auto;
    color: transparent;
    background-clip: text;
    -webkit-background-clip: text;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  /* SUBTEXT */
  .logo-sub {
    font-size:13px;
    color:#666;
    margin-left:10px;
    font-weight:500;
  }

  /* CONTAINER */
  .container {
    max-width:1100px;
    margin:auto;
    padding:30px 20px 40px;
  }

  h2 {
    margin-top:40px;
    margin-bottom:10px;
    font-size:20px;
    font-weight:600;
    color:#1f1f1f;
  }

  .form-grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:14px;
    margin-top:10px;
  }

  input, select {
    padding:12px;
    border-radius:8px;
    border:1px solid #e0e0e0;
    width:100%;
    background:white;
    font-size:14px;
    transition:all 0.2s ease;
  }

  input:focus, select:focus {
    outline:none;
    border-color:#007bff;
    box-shadow:0 0 0 2px rgba(0,123,255,0.1);
  }

  button {
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:6px 4px 0 0;
    font-size:14px;
    font-weight:500;
    transition:all 0.2s ease;
  }

  .btn-primary { background:#007bff; color:white; }
  .btn-primary:hover {
    background:#0062cc;
    transform:translateY(-1px);
    box-shadow:0 4px 12px rgba(0,123,255,0.25);
  }

  .btn-danger { background:#e74c3c; color:white; }
  .btn-danger:hover { background:#c0392b; transform:translateY(-1px); }

  .btn-success { background:#2ecc71; color:white; }
  .btn-success:hover { background:#27ae60; transform:translateY(-1px); }

  .btn-export { background:#6f42c1; color:white; }
  .btn-export:hover { background:#59359c; transform:translateY(-1px); }

  #search {
    padding:12px;
    width:320px;
    border-radius:8px;
    border:1px solid #e0e0e0;
  }

  #search:focus {
    outline:none;
    border-color:#007bff;
    box-shadow:0 0 0 2px rgba(0,123,255,0.1);
  }

  .card {
    background:white;
    padding:18px 20px;
    margin:14px 0;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    transition:all 0.25s ease;
    border:1px solid #f0f0f0;
  }

  .card:hover {
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
  }

  .deleted {
    background:#fafafa;
    opacity:0.65;
  }

  .pending {
    color:#ff8c00;
    font-weight:600;
    margin:6px 0;
  }

</style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<div class="navbar">
  <div>
    <span class="logo">ICKS</span>
    <span class="logo-sub">CRM System</span>
  </div>

</div>
  
<div class="container">

  <input id="fee" readonly placeholder="Fee">

  <select id="payment">
    <option>Cash</option>
    <option>UPI</option>
    <option>Bank</option>
  </select>

  <select id="stage">
    <option>Client registration at office</option>
    <option>Partial submission by client</option>
    <option>Full submission by client</option>
    <option>Work initiated at office</option>
    <option>In progress</option>
    <option>For client approval</option>

</div>

<button class="btn-primary" onclick="saveClient()">Save</button>
<button onclick="logout()">Logout</button>

<h2>Clients</h2>
<div id="list"></div>

</div>

</div>

// =========================
// 🔥 ROLE FETCH (FIXED HARD)
// =========================
async function getUserRole(email){
  try{
    const cleanEmail = email.toLowerCase().trim();

    console.log("Fetching role for:", cleanEmail);

    const ref = doc(db, "roles", cleanEmail);
    const snap = await getDoc(ref);

    if(snap.exists()){
      currentUserRole = (snap.data().role || "user").toLowerCase().trim();
    } else {
      console.warn("No role document found → default user");
      currentUserRole = "user";
    }

    console.log("FINAL ROLE:", currentUserRole);

  } catch(err){
    console.error("Role fetch error:", err);
    currentUserRole = "user";
  }
}

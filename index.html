<!DOCTYPE html>
<html>
<head>
  <title>Client Workflow Tracker</title>
  <style>
    body { font-family: Arial; margin: 20px; background:#f5f7fa; }
    input, select, button { margin:5px; padding:8px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
    .progress { height:20px; background:#ddd; border-radius:10px; overflow:hidden; }
    .bar { height:100%; transition:0.3s; }
  </style>
</head>
<body>

<div id="loginDiv">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="appDiv" style="display:none;">
<h2>Client Entry</h2>

<input id="name" placeholder="Name">
<input id="pb" placeholder="PB No">
<input id="pan" placeholder="PAN">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">

<select id="itr" onchange="setFee()">
  <option value="">Select ITR</option>
  <option value="ITR1">ITR-1</option>
  <option value="ITR2">ITR-2/3/4</option>
</select>

<input id="fee" placeholder="Fee" readonly>

<select id="payment">
  <option value="">Select Payment</option>
  <option>Cash</option>
  <option>UPI</option>
  <option>Bank Transfer</option>
</select>

<select id="stage">
  <option>Client registration at office</option>
  <option>Partial submission by client</option>
  <option>Full submission by client</option>
  <option>Work initiated at office</option>
  <option>In progress</option>
  <option>For client approval</option>
  <option>Completed</option>
</select>

<button onclick="addOrUpdateClient()">Add / Update Client</button>
<button onclick="logout()">Logout</button>

<h2>Clients</h2>
<div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsxAw40sFLw00PtEas3cvzRMEjkDZ9NJE",
  authDomain: "client-tracker-tool-5bdf6.firebaseapp.com",
  projectId: "client-tracker-tool-5bdf6",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let unsubscribe = null;

let stages = [
"Client registration at office",
"Partial submission by client",
"Full submission by client",
"Work initiated at office",
"In progress",
"For client approval",
"Completed"
];

// AUTH STATE FIX
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginDiv.style.display = "none";
    appDiv.style.display = "block";
    loadClients();
  } else {
    loginDiv.style.display = "block";
    appDiv.style.display = "none";
    if (unsubscribe) unsubscribe();
  }
});

// LOGIN
window.login = function () {
  signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value)
    .catch(err => alert(err.message));
};

// LOGOUT
window.logout = function () {
  signOut(auth);
};

// FEE
window.setFee = function(){
  let itr = itrEl.value;
  feeEl.value = itr === "ITR1" ? 849 : itr === "ITR2" ? 1349 : "";
};

// DUPLICATE CHECK FUNCTION
async function findExistingClient(pan, pb, mobile, email) {

  const queries = [];

  if (pan) queries.push(query(collection(db,"clients"), where("pan","==",pan)));
  if (pb) queries.push(query(collection(db,"clients"), where("pb","==",pb)));
  if (mobile) queries.push(query(collection(db,"clients"), where("mobile","==",mobile)));
  if (email) queries.push(query(collection(db,"clients"), where("email","==",email)));

  for (let q of queries) {
    const snap = await getDocs(q);
    if (!snap.empty) return snap.docs[0];
  }

  return null;
}

// ADD / UPDATE CLIENT
window.addOrUpdateClient = async function(){

  const name = nameEl.value;
  const pb = pbEl.value;
  const pan = panEl.value;
  const mobile = mobileEl.value;
  const email = emailEl.value;
  const itr = itrEl.value;
  const fee = feeEl.value;
  const payment = paymentEl.value;
  const stage = stageEl.value;

  if(!name || !pan || !itr || !fee || !payment){
    alert("Fill required fields");
    return;
  }

  const existing = await findExistingClient(pan, pb, mobile, email);

  if(existing){
    await updateDoc(existing.ref, {
      stage,
      payment
    });
    alert("Client Updated (Duplicate prevented)");
  } else {
    await addDoc(collection(db,"clients"), {
      name, pb, pan, mobile, email, itr,
      fee: Number(fee),
      payment, stage,
      created: new Date()
    });
    alert("New Client Added");
  }
};

// LOAD CLIENTS (FIXED LISTENER)
function loadClients(){

  if (unsubscribe) unsubscribe();

  unsubscribe = onSnapshot(collection(db,"clients"), (snapshot)=>{
    list.innerHTML = "";

    snapshot.forEach(d=>{
      let c = d.data();
      let percent = ((stages.indexOf(c.stage)+1)/stages.length)*100;
      let color = percent<40?"red":percent<80?"orange":"green";

      list.innerHTML += `
      <div class="card">
        <b>${c.name}</b> (${c.pan})<br>
        Fee: ₹${c.fee}<br>

        <select onchange="updateStage('${d.id}', this.value)">
          ${stages.map(s=>`<option ${s===c.stage?'selected':''}>${s}</option>`).join("")}
        </select>

        <div class="progress">
          <div class="bar" style="width:${percent}%; background:${color}"></div>
        </div>
      </div>`;
    });
  });
}

// UPDATE STAGE
window.updateStage = async function(id, newStage){
  await updateDoc(doc(db,"clients",id), { stage:newStage });
};
</script>

</body>
</html>

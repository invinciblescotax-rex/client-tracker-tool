<!DOCTYPE html>
<html>
<head>
  <title>Client Workflow Tracker</title>

  <style>
    body { font-family: Arial; margin: 20px; background:#f5f7fa; }
    input, select, button { margin:5px; padding:8px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
    .danger { background:red; color:white; }
    .approve { background:green; color:white; }
    .pending { color:orange; font-weight:bold; }
    .deleted { background:#eee; opacity:0.6; }
    .export { background:#007bff; color:white; }
  </style>

  <!-- Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div id="loginDiv">
  <h2>Login</h2>
  <input id="loginEmail"><br>
  <input id="loginPass" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="appDiv" style="display:none;">

<h2>Search</h2>
<input id="search" placeholder="Search..." onkeyup="filterClients()">

<h2>Export</h2>
<button class="export" onclick="exportExcel()">Export to Excel</button>
<button class="export" onclick="exportPDF()">Export to PDF</button>

<h2>Client Entry</h2>
<input id="name" placeholder="Name">
<input id="pb" placeholder="PB No">
<input id="pan" placeholder="PAN">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">

<select id="itr" onchange="setFee()">
<option value="">Select ITR</option>
<option value="ITR1">ITR-1</option>
<option value="ITR2">ITR-2/3/4</option>
</select>

<input id="fee" readonly>

<select id="payment">
<option>Cash</option>
<option>UPI</option>
<option>Bank</option>
</select>

<select id="stage">
<option>Client registration at office</option>
<option>Partial submission by client</option>
<option>Full submission by client</option>
<option>Work initiated at office</option>
<option>In progress</option>
<option>For client approval</option>
<option>Completed</option>
</select>

<button onclick="saveClient()">Save</button>
<button onclick="logout()">Logout</button>

<h2>Clients</h2>
<div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("oCSNm-4jMM9RJpB35");
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCsxAw40sFLw00PtEas3cvzRMEjkDZ9NJE",
  authDomain:"client-tracker-tool-5bdf6.firebaseapp.com",
  projectId:"client-tracker-tool-5bdf6"
});

const auth = getAuth(app);
const db = getFirestore(app);

let allClients=[];
let filteredClients=[];

// AUTH
onAuthStateChanged(auth,(user)=>{
if(user){
loginDiv.style.display="none";
appDiv.style.display="block";
loadClients();
}else{
loginDiv.style.display="block";
appDiv.style.display="none";
}
});

// LOGIN
window.login=()=>signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value);
window.logout=()=>signOut(auth);

// SAVE
window.saveClient=async()=>{
await setDoc(doc(db,"clients",pan.value),{
name:name.value,
pb:pb.value,
pan:pan.value,
mobile:mobile.value,
email:email.value,
itr:itr.value,
fee:Number(fee.value),
payment:payment.value,
stage:stage.value,
isDeleted:false,
updated:new Date()
},{merge:true});
alert("Saved");
};

// LOAD
function loadClients(){
onSnapshot(collection(db,"clients"),(snapshot)=>{
allClients=[];
snapshot.forEach(d=>allClients.push(d.data()));
filteredClients=[...allClients];
renderClients(filteredClients);
});
}

// FILTER
window.filterClients=()=>{
let q=search.value.toLowerCase();
filteredClients=allClients.filter(c=>
(c.name||"").toLowerCase().includes(q) ||
(c.pan||"").toLowerCase().includes(q) ||
(c.mobile||"").toLowerCase().includes(q) ||
(c.email||"").toLowerCase().includes(q) ||
(c.pb||"").toLowerCase().includes(q)
);
renderClients(filteredClients);
};

// RENDER
function renderClients(data){
list.innerHTML="";
data.forEach(c=>{
list.innerHTML+=`
<div class="card">
<b>Name:</b> ${c.name}<br>
<b>PB:</b> ${c.pb}<br>
<b>PAN:</b> ${c.pan}<br>
<b>Mobile:</b> ${c.mobile}<br>
<b>Email:</b> ${c.email}<br>
<b>ITR:</b> ${c.itr}<br>
<b>Fee:</b> ₹${c.fee}<br>
<b>Payment:</b> ${c.payment}<br>
<b>Stage:</b> ${c.stage}<br>
</div>`;
});
}

// EXPORT EXCEL
window.exportExcel=()=>{
let data=filteredClients.map(c=>({
Name:c.name,
PB:c.pb,
PAN:c.pan,
Mobile:c.mobile,
Email:c.email,
ITR:c.itr,
Fee:c.fee,
Payment:c.payment,
Stage:c.stage
}));

let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Clients");
XLSX.writeFile(wb,"clients.xlsx");
};

// EXPORT PDF
window.exportPDF=()=>{
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let y=10;

filteredClients.forEach((c,i)=>{
doc.text(`${i+1}. ${c.name} | ${c.pan} | ${c.mobile}`,10,y);
y+=10;
if(y>280){doc.addPage();y=10;}
});

doc.save("clients.pdf");
};

</script>

</body>
</html>

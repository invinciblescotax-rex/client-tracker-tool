<!DOCTYPE html>
<html>
<head>
  <title>Client Workflow Tracker</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background:#f4f6f9;
    }

    /* HEADER (matches your website theme) */
    .header {
      background:#1f1f1f;
      color:white;
      padding:15px 30px;
      font-size:20px;
      font-weight:bold;
    }

    .container {
      padding:20px;
    }

    input, select, button {
      margin:5px;
      padding:8px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button {
      cursor:pointer;
    }

    .card {
      background:white;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .danger { background:#e74c3c; color:white; border:none; }
    .approve { background:#27ae60; color:white; border:none; }
    .export { background:#3498db; color:white; border:none; }

    .pending { color:#f39c12; font-weight:bold; }
    .deleted { background:#eee; opacity:0.6; }

    h2 {
      margin-top:25px;
      color:#333;
    }
  </style>

  <!-- Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="header">Invincibles Co - Client Tracker</div>

<div class="container">

<div id="loginDiv">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="appDiv" style="display:none;">

<h2>Search</h2>
<input id="search" placeholder="Search..." onkeyup="filterClients()">

<h2>Export</h2>
<button class="export" onclick="exportExcel()">Export to Excel</button>
<button class="export" onclick="exportPDF()">Export to PDF</button>

<h2>Client Entry</h2>
<input id="name" placeholder="Name">
<input id="pb" placeholder="PB No">
<input id="pan" placeholder="PAN">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">

<select id="itr" onchange="setFee()">
<option value="">Select ITR</option>
<option value="ITR1">ITR-1</option>
<option value="ITR2">ITR-2/3/4</option>
<option value="CONSULT">Consultation</option>
</select>

<input id="fee" placeholder="Fee" readonly>

<select id="payment">
<option>Cash</option>
<option>UPI</option>
<option>Bank</option>
</select>

<select id="stage">
<option>Client registration at office</option>
<option>Partial submission by client</option>
<option>Full submission by client</option>
<option>Work initiated at office</option>
<option>In progress</option>
<option>For client approval</option>
<option>Completed</option>
</select>

<button onclick="saveClient()">Save</button>
<button onclick="logout()">Logout</button>

<h2>Clients</h2>
<div id="list"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("oCSNm-4jMM9RJpB35");
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCsxAw40sFLw00PtEas3cvzRMEjkDZ9NJE",
  authDomain:"client-tracker-tool-5bdf6.firebaseapp.com",
  projectId:"client-tracker-tool-5bdf6"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUserEmail="";
let allClients=[];
let filteredClients=[];

onAuthStateChanged(auth,(user)=>{
if(user){
currentUserEmail=user.email;
loginDiv.style.display="none";
appDiv.style.display="block";
loadClients();
}else{
loginDiv.style.display="block";
appDiv.style.display="none";
}
});

window.login=()=>signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value);
window.logout=()=>signOut(auth);

// UPDATED FEE LOGIC
window.setFee=()=>{
if(itr.value==="ITR1") fee.value=849;
else if(itr.value==="ITR2") fee.value=1349;
else if(itr.value==="CONSULT") fee.value=199;
else fee.value="";
};

window.saveClient=async()=>{
let ref=doc(db,"clients",pan.value);
let snap=await getDoc(ref);
let isNew=!snap.exists();

await setDoc(ref,{
name:name.value,
pb:pb.value,
pan:pan.value,
mobile:mobile.value,
email:email.value,
itr:itr.value,
fee:Number(fee.value),
payment:payment.value,
stage:stage.value,
isDeleted:false,
deleteRequested:false,
requestedBy:"",
updated:new Date()
},{merge:true});

if(isNew && stage.value==="Client registration at office"){
emailjs.send("service_ns9w7qv","template_87k6k2w",{
name:name.value,pan:pan.value,mobile:mobile.value,itr:itr.value,fee:fee.value
});
}

alert("Saved");
};

window.requestDelete=async(pan)=>{
await setDoc(doc(db,"clients",pan),{
deleteRequested:true,
requestedBy:currentUserEmail
},{merge:true});

emailjs.send("service_ns9w7qv","template_rigq89q",{
pan:pan,
requestedBy:currentUserEmail
});

alert("Delete request sent");
};

window.approveDelete=async(pan,requestedBy)=>{
if(requestedBy===currentUserEmail){
alert("Cannot approve your own request");
return;
}

await setDoc(doc(db,"clients",pan),{
isDeleted:true,
deletedBy:currentUserEmail,
deletedAt:new Date()
},{merge:true});

alert("Marked as deleted");
};

function loadClients(){
onSnapshot(collection(db,"clients"),(snapshot)=>{
allClients=[];
snapshot.forEach(d=>allClients.push(d.data()));
filteredClients=[...allClients];
renderClients(filteredClients);
});
}

window.filterClients=()=>{
let q=search.value.toLowerCase();
filteredClients=allClients.filter(c=>
(c.name||"").toLowerCase().includes(q) ||
(c.pan||"").toLowerCase().includes(q) ||
(c.mobile||"").toLowerCase().includes(q) ||
(c.email||"").toLowerCase().includes(q) ||
(c.pb||"").toLowerCase().includes(q)
);
renderClients(filteredClients);
};

function renderClients(data){
list.innerHTML="";
data.forEach(c=>{
list.innerHTML+=`
<div class="card ${c.isDeleted?'deleted':''}">
<b>${c.name}</b> (${c.pan})<br>
Mobile: ${c.mobile}<br>
Email: ${c.email}<br>
ITR: ${c.itr}<br>
Fee: ₹${c.fee}<br>
Stage: ${c.stage}<br>

${c.isDeleted ? "<b style='color:red;'>Deleted</b><br>" : ""}

${
!c.deleteRequested && !c.isDeleted
? `<button class="danger" onclick="requestDelete('${c.pan}')">Delete</button>`
: c.deleteRequested && !c.isDeleted
? `<div class="pending">Pending (${c.requestedBy})</div>
<button class="approve" onclick="approveDelete('${c.pan}','${c.requestedBy}')">Approve</button>`
: ""
}
</div>`;
});
}

// EXPORT
window.exportExcel=()=>{
let data=(filteredClients.length?filteredClients:allClients).map(c=>({
Name:c.name,PAN:c.pan,Mobile:c.mobile,Email:c.email,ITR:c.itr,Fee:c.fee,Stage:c.stage
}));
let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Clients");
XLSX.writeFile(wb,"clients.xlsx");
};

window.exportPDF=()=>{
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
let y=10;

(filteredClients.length?filteredClients:allClients).forEach((c,i)=>{
doc.text(`${i+1}. ${c.name} | ${c.pan} | ${c.mobile}`,10,y);
y+=8;
if(y>280){doc.addPage();y=10;}
});

doc.save("clients.pdf");
};

</script>

</body>
</html>
